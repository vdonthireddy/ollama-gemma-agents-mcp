<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GemmaJnana Playground</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
        :root {
            --bg-color: #080911;
            --panel-bg: rgba(17, 18, 36, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-color: #7c5dfa;
            --accent-glow: rgba(124, 93, 250, 0.3);
            --text-primary: #f8f9fa;
            --text-secondary: #9ea2c0;
            --user-bubble: #252849;
            --gemma-bubble: rgba(30, 32, 60, 0.4);
            --input-bg: rgba(0, 0, 0, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at 50% 50%, #121324 0%, var(--bg-color) 100%);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Container */
        .chat-window {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
            overflow: hidden;
            position: relative;
        }

        /* Header */
        .chat-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.15);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #6c757d;
            box-shadow: 0 0 6px #6c757d;
        }

        .status-dot.online {
            background-color: #4caf50;
            box-shadow: 0 0 8px #4caf50;
        }

        .status-dot.offline {
            background-color: #f44336;
            box-shadow: 0 0 8px #f44336;
        }

        .header-title h2 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .header-title p {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn-action {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            font-family: inherit;
            font-size: 12px;
            font-weight: 500;
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-action:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }

        .btn-clear:hover {
            background: rgba(244, 67, 54, 0.1);
            border-color: rgba(244, 67, 54, 0.3);
            color: #ff5252;
        }

        /* Responses / Message Box - on top */
        .messages-container {
            flex: 1;
            padding: 28px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 22px;
            scroll-behavior: smooth;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-sender {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 5px;
            padding-left: 4px;
        }

        .message.user .message-sender {
            text-align: right;
            padding-right: 4px;
        }

        .message-bubble {
            padding: 15px 20px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.55;
            white-space: pre-wrap;
            border: 1px solid transparent;
            word-break: break-word;
        }

        .message.user .message-bubble {
            background-color: var(--user-bubble);
            color: var(--text-primary);
            border-bottom-right-radius: 4px;
            border-color: rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .message.assistant .message-bubble {
            background-color: var(--gemma-bubble);
            border-color: var(--border-color);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        /* Text Box - fixed at the bottom */
        .input-area {
            padding: 24px 28px;
            border-top: 1px solid var(--border-color);
            background: rgba(0, 0, 0, 0.1);
        }

        .input-row {
            display: flex;
            gap: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 8px 10px 8px 18px;
            align-items: flex-end;
            transition: all 0.3s;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .input-row:focus-within {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(124, 93, 250, 0.15), inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 15px;
            outline: none;
            padding: 8px 0;
            resize: none;
            height: auto;
            min-height: 24px;
            max-height: 200px;
            line-height: 1.5;
            overflow-y: auto;
            field-sizing: content;
        }

        .send-button {
            background: var(--accent-color);
            color: #ffffff;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(124, 93, 250, 0.35);
        }

        .send-button:hover {
            background: #8e73ff;
            transform: scale(1.03);
        }

        .send-button:active {
            transform: scale(0.97);
        }

        .send-button svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            gap: 16px;
            color: var(--text-secondary);
            text-align: center;
            padding: 40px;
        }

        .empty-icon {
            font-size: 52px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .empty-state h3 {
            color: var(--text-primary);
            font-size: 20px;
            font-weight: 600;
        }

        .empty-state p {
            max-width: 440px;
            font-size: 14px;
            line-height: 1.5;
        }

        /* Settings popover */
        .settings-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            padding: 0 4px;
        }

        .settings-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .settings-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            color: var(--text-primary);
            padding: 2px 6px;
            font-family: inherit;
            width: 50px;
            font-size: 11px;
            outline: none;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .blinking-dots {
            animation: pulse-dots 1.2s infinite;
            font-weight: 700;
            font-size: 20px;
            letter-spacing: 2px;
            display: inline-block;
        }

        @keyframes pulse-dots {

            0%,
            100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        /* Markdown Rendering Styles */
        .message-bubble p {
            margin-bottom: 8px;
        }
        .message-bubble p:last-child {
            margin-bottom: 0;
        }
        .message-bubble blockquote {
            border-left: 3px solid var(--accent-color);
            padding-left: 12px;
            margin: 8px 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .message-bubble code {
            font-family: 'Courier New', Courier, monospace;
            background: rgba(0, 0, 0, 0.25);
            padding: 2px 5px;
            border-radius: 4px;
            font-size: 14px;
        }
        .message-bubble pre {
            background: rgba(0, 0, 0, 0.35);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
            border: 1px solid var(--border-color);
        }
        .message-bubble pre code {
            background: transparent;
            padding: 0;
            border-radius: 0;
            font-size: 13px;
        }
        .message-bubble ul, .message-bubble ol {
            margin: 8px 0 8px 18px;
        }
        .message-bubble li {
            margin-bottom: 4px;
        }

        /* Search Status Styles */
        .search-status-container {
            margin-bottom: 12px;
        }

        .search-status-box {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: slideUp 0.3s ease-out;
        }

        .search-status-header {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-icon {
            font-size: 14px;
            color: var(--accent-color);
        }

        .search-spinner {
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top: 2px solid var(--accent-color);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .search-results-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
        }

        .search-source-chip {
            background: rgba(124, 93, 250, 0.08);
            border: 1px solid rgba(124, 93, 250, 0.15);
            border-radius: 8px;
            padding: 4px 8px;
            font-size: 11px;
            color: #a894ff;
            text-decoration: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            max-width: 200px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-source-chip:hover {
            background: rgba(124, 93, 250, 0.15);
            border-color: rgba(124, 93, 250, 0.3);
            color: #ffffff;
            box-shadow: 0 0 8px rgba(124, 93, 250, 0.2);
        }
    </style>
</head>

<body>
    <div class="chat-window">
        <!-- Header -->
        <header class="chat-header">
            <div class="header-left">
                <div class="status-dot" id="status-indicator"></div>
                <div class="header-title">
                    <h2>GemmaJnana</h2>
                    <p id="server-status-text">Connecting to gateway...</p>
                </div>
            </div>
            <div class="header-actions">
                <button onclick="clearChat()" class="btn-action btn-clear">Clear Chat</button>
            </div>
        </header>

        <!-- Messages Area (on top) -->
        <div class="messages-container" id="messages-container">
            <div class="empty-state" id="empty-state">
                <div class="empty-icon">🤖</div>
                <h3>GemmaJnana</h3>
                <p>Welcome! Type a prompt below to communicate with the local GemmaJnana (Google Gemma 4 Effective 4B) assistant via FastAPI.</p>
            </div>
        </div>

        <!-- Input Area (fixed at the bottom) -->
        <div class="input-area">
            <div class="input-row">
                <textarea id="user-input" class="chat-input" placeholder="Ask GemmaJnana anything..." rows="1"></textarea>
                <button onclick="handleSend()" class="send-button" id="send-button">
                    <svg viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="settings-bar">
                <div class="settings-item">
                    <span>Model: <strong style="color: var(--text-primary);">gemma4:e4b</strong></span>
                </div>
                <div class="settings-item">
                    <label for="temperature">Temp:</label>
                    <input type="number" id="temperature" class="settings-input" min="0" max="2" step="0.1" value="0.3">
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8435';
        const sessionName = 'playground_' + Math.random().toString(36).substring(2, 10);
        let chatHistory = [];
        let isGenerating = false;

        function escapeHTML(str) {
            if (!str) return '';
            return str
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderMath(element) {
            if (typeof renderMathInElement !== 'undefined') {
                renderMathInElement(element, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false
                });
            }
        }

        // Parse markdown and protect math blocks from being escaped/modified by marked
        function parseMarkdownAndMath(text) {
            if (!text) return '';

            const mathBlocks = [];

            // 1. Protect display math: $$ ... $$
            let processedText = text.replace(/\$\$([\s\S]+?)\$\$/g, (match) => {
                const placeholder = `%%MATH_BLOCK_${mathBlocks.length}%%`;
                mathBlocks.push({ placeholder, original: match });
                return placeholder;
            });

            // 2. Protect display math: \[ ... \]
            processedText = processedText.replace(/\\\[([\s\S]+?)\\\]/g, (match) => {
                const placeholder = `%%MATH_BLOCK_${mathBlocks.length}%%`;
                mathBlocks.push({ placeholder, original: match });
                return placeholder;
            });

            // 3. Protect inline math: \( ... \)
            processedText = processedText.replace(/\\\(([\s\S]+?)\\\)/g, (match) => {
                const placeholder = `%%MATH_BLOCK_${mathBlocks.length}%%`;
                mathBlocks.push({ placeholder, original: match });
                return placeholder;
            });

            // 4. Protect inline math: $ ... $ (avoid matching basic dollar amounts by using non-space check)
            processedText = processedText.replace(/\$([^\$\s](?:[^\$]*?[^\$\s])?)\$/g, (match) => {
                const placeholder = `%%MATH_BLOCK_${mathBlocks.length}%%`;
                mathBlocks.push({ placeholder, original: match });
                return placeholder;
            });

            // 5. Parse markdown
            let parsedHTML = typeof marked !== 'undefined' ? marked.parse(processedText) : processedText;

            // 6. Restore math blocks
            for (const block of mathBlocks) {
                parsedHTML = parsedHTML.replace(block.placeholder, block.original);
            }

            return parsedHTML;
        }

        // Check health of FastAPI gateway and Ollama
        async function checkConnection() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                const indicator = document.getElementById('status-indicator');
                const text = document.getElementById('server-status-text');

                if (data.status === 'healthy') {
                    indicator.className = 'status-dot online';
                    text.textContent = 'API Gateway & Ollama Connected';
                } else if (data.status === 'warning') {
                    indicator.className = 'status-dot online';
                    indicator.style.backgroundColor = '#ff9800';
                    indicator.style.boxShadow = '0 0 8px #ff9800';
                    text.textContent = 'Ollama Connected (Warning: Model not found)';
                } else {
                    indicator.className = 'status-dot offline';
                    text.textContent = 'Gateway Offline or Ollama disconnected';
                }
            } catch (error) {
                document.getElementById('status-indicator').className = 'status-dot offline';
                document.getElementById('server-status-text').textContent = 'Cannot connect to Gateway (Port 8435)';
            }
        }

        function clearChat() {
            chatHistory = [];
            const container = document.getElementById('messages-container');
            container.innerHTML = `
                <div class="empty-state" id="empty-state">
                    <div class="empty-icon">🤖</div>
                    <h3>GemmaJnana</h3>
                    <p>Welcome! Type a prompt below to communicate with the local GemmaJnana (Google Gemma 4 Effective 4B) assistant via FastAPI.</p>
                </div>
            `;
        }

        function appendMessage(sender, text, role) {
            const emptyState = document.getElementById('empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const container = document.getElementById('messages-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const senderSpan = document.createElement('span');
            senderSpan.className = 'message-sender';
            senderSpan.textContent = sender;

            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            
            if (role === 'assistant') {
                const statusDiv = document.createElement('div');
                statusDiv.className = 'search-status-container';
                bubbleDiv.appendChild(statusDiv);

                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.innerHTML = text;
                bubbleDiv.appendChild(contentDiv);
            } else {
                const contentDiv = document.createElement('div');
                contentDiv.className = 'message-content';
                contentDiv.innerHTML = parseMarkdownAndMath(escapeHTML(text));
                bubbleDiv.appendChild(contentDiv);
                renderMath(contentDiv);
            }

            messageDiv.appendChild(senderSpan);
            messageDiv.appendChild(bubbleDiv);
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;

            return bubbleDiv;
        }

        function handleSlashCommand(command) {
            const cmd = command.toLowerCase().trim();
            if (cmd === '/clear') {
                clearChat();
                return true;
            }
            return false;
        }

        async function handleSend() {
            if (isGenerating) return;
            const inputEl = document.getElementById('user-input');
            const sendBtn = document.getElementById('send-button');
            const prompt = inputEl.value.trim();
            if (!prompt) return;

            inputEl.value = '';
            adjustHeight();

            // Handle slash commands
            if (prompt.startsWith('/')) {
                if (handleSlashCommand(prompt)) {
                    return;
                }
            }

            // Append User Message
            appendMessage('You', prompt, 'user');
            chatHistory.push({ role: 'user', content: prompt });

            const temperature = parseFloat(document.getElementById('temperature').value) || 0.3;

            // Create Assistant Message Bubble
            const assistantBubble = appendMessage('GemmaJnana', '', 'assistant');
            const statusContainer = assistantBubble.querySelector('.search-status-container');
            const contentContainer = assistantBubble.querySelector('.message-content');
            
            contentContainer.innerHTML = '<span class="blinking-dots">...</span>';

            try {
                isGenerating = true;
                inputEl.disabled = true;
                sendBtn.disabled = true;
                sendBtn.style.opacity = '0.5';
                sendBtn.style.cursor = 'not-allowed';
                const response = await fetch(`${API_BASE}/chat/stream`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        messages: chatHistory,
                        temperature: temperature,
                        session_name: sessionName
                    })
                });

                if (!response.ok) {
                    const errorText = await response.text();
                    contentContainer.textContent = `Error: ${errorText}`;
                    contentContainer.style.color = '#ff5252';
                    return;
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let fullResponse = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const payload = JSON.parse(line.slice(6));
                                if (payload.error) {
                                    contentContainer.textContent = `Error: ${payload.error}`;
                                    contentContainer.style.color = '#ff5252';
                                    break;
                                }
                                if (payload.status === 'searching') {
                                    contentContainer.innerHTML = '';
                                    statusContainer.innerHTML = `
                                        <div class="search-status-box">
                                            <div class="search-status-header">
                                                <span class="search-icon">🔍</span>
                                                <span class="search-text">Searching for: "<em>${escapeHTML(payload.query)}</em>"...</span>
                                                <span class="search-spinner"></span>
                                            </div>
                                        </div>
                                    `;
                                    document.getElementById('messages-container').scrollTop = document.getElementById('messages-container').scrollHeight;
                                } else if (payload.status === 'results') {
                                    const results = payload.results || [];
                                    if (results.length > 0) {
                                        let chipsHTML = results.map((r, index) => `
                                            <a href="${escapeHTML(r.href)}" target="_blank" class="search-source-chip" title="${escapeHTML(r.body)}">
                                                <span>[${index + 1}]</span>
                                                <strong>${escapeHTML(r.title)}</strong>
                                            </a>
                                        `).join('');
                                        
                                        statusContainer.innerHTML = `
                                            <div class="search-status-box success">
                                                <div class="search-status-header">
                                                    <span class="search-icon">✨</span>
                                                    <span class="search-text">Found sources:</span>
                                                </div>
                                                <div class="search-results-list">
                                                    ${chipsHTML}
                                                </div>
                                            </div>
                                        `;
                                    } else {
                                        statusContainer.innerHTML = `
                                            <div class="search-status-box warning">
                                                <div class="search-status-header">
                                                    <span class="search-icon">⚠️</span>
                                                    <span class="search-text">No search results found.</span>
                                                </div>
                                            </div>
                                        `;
                                    }
                                    contentContainer.innerHTML = '<span class="blinking-dots">...</span>';
                                    document.getElementById('messages-container').scrollTop = document.getElementById('messages-container').scrollHeight;
                                } else if (payload.content) {
                                    if (contentContainer.querySelector('.blinking-dots')) {
                                        contentContainer.innerHTML = '';
                                    }
                                    fullResponse += payload.content;
                                    contentContainer.innerHTML = parseMarkdownAndMath(fullResponse);
                                    renderMath(contentContainer);
                                    document.getElementById('messages-container').scrollTop = document.getElementById('messages-container').scrollHeight;
                                }
                            } catch (e) {
                                // Handled chunk parsing errors
                            }
                        }
                    }
                }

                chatHistory.push({ role: 'assistant', content: fullResponse });

            } catch (error) {
                contentContainer.textContent = `Connection error: ${error.message}`;
                contentContainer.style.color = '#ff5252';
            } finally {
                isGenerating = false;
                inputEl.disabled = false;
                sendBtn.disabled = false;
                sendBtn.style.opacity = '1';
                sendBtn.style.cursor = 'pointer';
                setTimeout(() => {
                    inputEl.focus();
                }, 50);
                
                // Clear blinking dots if they are still present (e.g. no content returned or empty response)
                if (contentContainer.querySelector('.blinking-dots')) {
                    contentContainer.innerHTML = fullResponse ? parseMarkdownAndMath(fullResponse) : '<em>No response content.</em>';
                }
                renderMath(contentContainer);
            }
        }

        const userInputEl = document.getElementById('user-input');

        function adjustHeight() {
            if (!CSS.supports('field-sizing', 'content')) {
                userInputEl.style.height = 'auto';
                userInputEl.style.height = userInputEl.scrollHeight + 'px';
            }
        }

        userInputEl.addEventListener('input', adjustHeight);
        userInputEl.addEventListener('keydown', function(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                handleSend();
            }
        });

        // Initialize connection check and set poll
        checkConnection();
        setInterval(checkConnection, 5000);

        // Adjust height initially
        adjustHeight();

        // Focus user input text box on load
        userInputEl.focus();
    </script>
</body>

</html>
